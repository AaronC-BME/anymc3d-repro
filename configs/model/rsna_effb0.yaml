# @package _global_
model:
  arch: "rsna_cnn"
  run_name: "rsna-effb0-native64-lr1e6"
  num_classes: 4
  backbone_name: "efficientnet_b0"
  target_slices: 96
  n_triplets: 32
  img_size: 64
  gru_hidden: 256
  gru_layers: 2
  bidirectional: true
  dropout: 0.2

optimizer:
  lr: 1e-6          # ← overrides train.yaml
  weight_decay: 1e-4
  warmup_epochs: 10