# @package _global_

model:
  arch: vjepa2_anymc3d
  run_name: vjepa21-vitb-pdcad-num_frames64_loraLR_5e-6_wd_1e-5_headLR_5e-5_wd_1e-4_DA_real
  hub_name: "vjepa2_1_vit_base_384"
  lora_rank:  8
  lora_alpha: 16
  num_frames: 64
  slice_axis: 3
  num_classes: 2
  dropout:     0.1

data:
  augment: true
  dataset: pdcad
  patch_size: [300, 300, 70]

optimizer:
  lora_lr: 5.0e-06
  lora_weight_decay: 1.0e-05
  head_lr: 5.0e-05
  head_weight_decay: 1.0e-04
  warmup_epochs: 0
  lr_scheduler: "cosine"     

# ── Clip parameters ───────────────────────────────────────────────────────
# num_frames MUST be even (tubelet_size=2).
# PDCAD has S=70 slices along axis 3.
#
# Token counts for ViT-B 2.1 (crop=384):
#   T=32  →  (32/2) × (384/16)² =  9,216 tokens  — safe at batch=1
#   T=70  →  (70/2) × (384/16)² = 20,160 tokens  — needs grad checkpointing
num_frames: 64
slice_axis: 3

# ── Head ──────────────────────────────────────────────────────────────────
num_classes: 2
dropout:     0.1
