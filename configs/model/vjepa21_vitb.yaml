# @package _global_
# Selecting this model: `python train.py model=vjepa21_vitb_pdcad`

model:
  _target_: model_arch.vjepa2_anymc3d.VJEPA2LightningModule
  task:           multiclass  # multiclass vs. multilabel

  # ── Backbone ─────────────────────────────────────────────────────────────
  # crop_size is inferred from hub_name (384 for all V-JEPA 2.1 entry points),
  # so there's no `input_size` to set.
  hub_name:              "vjepa2_1_vit_base_384"
  vjepa_checkpoint_path: /home/jma/Documents/projects/aaron/AnyMC3D/vjepa_2_1_checkpoint/vjepa2_1_vitb_dist_vitG_384.pt
  lora_rank:             8
  lora_alpha:            16

  # ── Clip parameters ──────────────────────────────────────────────────────
  # num_frames MUST be even (tubelet_size=2). PDCAD has S=70 slices.
  # Token counts for ViT-B 2.1 (crop=384):
  #   T=32  →  (32/2) × (384/16)² =  9,216 tokens  — safe at batch=2
  #   T=64  →  (64/2) × (384/16)² = 18,432 tokens  — in-distribution for 3D-RoPE
  #   T=70  →  (70/2) × (384/16)² = 20,160 tokens  — slight RoPE extrapolation
  num_frames: 64
  slice_axis: 3

  # ── Head ─────────────────────────────────────────────────────────────────
  num_classes: 2
  dropout:     0.0

  # ── AnyMC3D-parity flags ─────────────────────────────────────────────────
  # All False = flat mean-pool over all N_tokens (original V-JEPA behaviour).
  # Turn these on to match the DINOv2 AnyMC3D ablations.
  use_slice_attn_pool: true
  use_patch_attn_pool: false
  use_patch_concat:    false
  use_25d:             false

  # ── Optimizer ────────────────────────────────────────────────────────────
  # Note: no vision_lr / vision_weight_decay — V-JEPA has no separate learnable
  # vision blocks; only LoRA on the frozen encoder + the head.
  lora_lr:           1.0e-04
  lora_weight_decay: 1.0e-05
  head_lr:           1.0e-03
  head_weight_decay: 1.0e-04
  warmup_epochs:     0
  lr_scheduler:      cosine

  # ── Loss ─────────────────────────────────────────────────────────────────
  focal_gamma: 2.0
  focal_alpha: 0.25

  # ── Training ───────────────────────────────────────────
  max_epochs: 150
  seed: 0
  precision: "16-mixed"
  early_stopping_patience: 150
  save_top_k: 3
  log_every_n_steps: 10

  # ── New: multi-GPU / DDP ──────────────────────────────────
  devices:        1            # int (count), -1 (all), or list e.g. [0,1]
  strategy:       auto         # "auto" for single-GPU; "ddp" for multi-GPU
  num_nodes:      1            # >1 only for multi-machine training
  sync_batchnorm: false        # leave false unless you add BN layers

  # ── WandB ────────────────────────────────────────────────────────────────
  project: "pdcad-anymc3d"
  run_name: vjepa21-vitb-PatchAttnPool_num_frames64_loraLR_1e-4_headLR_1e-3_DA