# @package _global_


model:
  arch: "anymc3d"
  run_name: "anymc3d-vitb14-pdcad_v2_slice_axis3_150ep_const"   
  modalities: ["nm"]                # single modality, single view
  backbone_name: "dinov2_vitb14"
  num_classes: 2                    # binary: presence vs absence
  lora_rank: 8                      
  lora_alpha: 16                   
  input_size: 308                  
  dropout: 0.1
  slice_axis: 3                    

optimizer:
  lora_lr: 1.0e-04                  
  lora_weight_decay: 1.0e-05        
  head_lr: 1.0e-03                  
  head_weight_decay: 1.0e-04        
  warmup_epochs: 0
  lr_scheduler: "cosine"          

loss:
  focal_gamma: 2.0                  
  focal_alpha: 0.25                 
  
training:
  max_epochs: 150                  
  seed: 0                           
