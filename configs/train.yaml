# ---------------------------------------------------------------
# Main training config
# ---------------------------------------------------------------
# The model file now bundles its matching optimizer and loss via
# `# @package _global_`, so those groups have dropped out of the
# defaults list. Picking `model=anymc3d` is enough to get all three.
#
# Override any group from the command line:
#   python train.py                             # uses defaults below
#   python train.py data=pdcad model=anymc3d    # explicit (same thing)
#   python train.py model=vjepa2_anymc3d        # swap model (+ its optimizer+loss)
#   python train.py optimizer.lora_lr=2e-4      # override individual keys still works
#   python train.py loss.focal_alpha=0.25       # ditto

defaults:
  - _self_
  - data:     pdcad
  - model:    anymc3d_vitb