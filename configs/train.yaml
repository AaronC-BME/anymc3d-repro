defaults:
  - model: anymc3d_vitl    # swap to: anymc3d_vitb, rsna_effb0, rsna_effb4
  - _self_

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  data_root: "/path/to/data"
  labels_path: "/path/to/labels.json"
  splits_path: "/path/to/splits.json"
  fold: 0
  batch_size: 2
  num_workers: 4
  augment: true
  dataset: "meningioma"    # ← tells train.py which datamodule to import

# ── Optimizer ─────────────────────────────────────────────────────────────────
optimizer:
  # RSNA-CNN (single LR for all params)
  lr: 1e-4
  weight_decay: 1e-4
  # Shared
  warmup_epochs: 0

# ── Loss ──────────────────────────────────────────────────────────────────────
loss:
  focal_gamma: 2.0
  focal_alpha: 0.25

# ── Training ──────────────────────────────────────────────────────────────────
training:
  max_epochs: 200
  precision: "16-mixed"
  early_stopping_patience: 40
  save_top_k: 3
  log_every_n_steps: 5
  seed: 42

# ── W&B ───────────────────────────────────────────────────────────────────────
wandb:
  project: "meningioma-anymc3d"