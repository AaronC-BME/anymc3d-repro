defaults:
  - model: anymc3d_vitb_pdcad
  - _self_

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  # Point to the NEW percentile-normalized data (from preprocess_anymc3d_v2.py)
  data_root:   "/home/jma/Documents/projects/aaron/AnyMC3D/preprocessed_data/PDCAD"
  labels_path: "/home/jma/Documents/projects/aaron/nnssl_dataset/nnssl_preprocessed/Dataset009_PDCAD_NM/labels.json"
  splits_path: "/home/jma/Documents/projects/aaron/nnssl_dataset/nnssl_preprocessed/Dataset009_PDCAD_NM/splits.json"
  fold: 0
  batch_size: 2                     # author: batch_size: 2
  num_workers: 8                    # author: num_workers: 8
  augment: true
  dataset: "pdcad"
  patch_size: [308, 308, 70]        # author: patch_size: [308, 308, 70]

# ── Optimizer ─────────────────────────────────────────────────────────────────
# (defaults come from model config, but can be overridden here)
optimizer:
  lr: 1e-4
  weight_decay: 1e-4
  warmup_epochs: 0
  lr_scheduler: "constant"          # no scheduler mentioned in author's config

# ── Loss ──────────────────────────────────────────────────────────────────────
loss:
  focal_gamma: 2.0
  focal_alpha: 0.25

# ── Training ──────────────────────────────────────────────────────────────────
training:
  max_epochs: 150                   # author: max_epoch: 150
  precision: "16-mixed"             # author: amp: True
  early_stopping_patience: 150
  save_top_k: 3
  log_every_n_steps: 5
  seed: 0                           # author: seed: 0

# ── W&B ───────────────────────────────────────────────────────────────────────
wandb:
  project: "pdcad-anymc3d"                  # author: wandb_project_name: PDCAD